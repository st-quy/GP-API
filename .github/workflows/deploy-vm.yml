name: Deploy GP-API to VM (release-v2/develop/uat)

on:
  push:
    branches: [ release/v2, develop, uat ]
  workflow_dispatch:

concurrency:
  group: vm-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy_release_v2:
    name: Deploy release/v2
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'release/v2' }}
    steps:
      - name: SSH & deploy (release/v2)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="/home/phamvanquy1306/GreenLight/GP-API"
            COMPOSE_DIR="/home/phamvanquy1306/GreenLight"
            BRANCH="release/v2"

            echo "➡️ Git in $REPO_DIR (branch $BRANCH)"
            test -d "$REPO_DIR" || (echo "❌ Missing $REPO_DIR"; exit 1)
            cd "$REPO_DIR"
            git remote -v
            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "🧩 Compose dir: $COMPOSE_DIR"
            test -f "$COMPOSE_DIR/docker-compose.yml" -o -f "$COMPOSE_DIR/docker-compose.yaml" || (echo "❌ No docker-compose in $COMPOSE_DIR"; exit 1)

            cd "$COMPOSE_DIR"
            docker compose pull || true
            docker compose up -d --build
            echo "✅ Deployed release/v2"

  deploy_develop:
    name: Deploy develop
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'develop' }}
    steps:
      - name: SSH & deploy (develop)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="/home/phamvanquy1306/dev/GreenLight/GP-API"
            COMPOSE_DIR="/home/phamvanquy1306/dev/GreenLight"
            BRANCH="develop"

            echo "➡️ Git in $REPO_DIR (branch $BRANCH)"
            test -d "$REPO_DIR" || (echo "❌ Missing $REPO_DIR"; exit 1)
            cd "$REPO_DIR"
            git remote -v
            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "🧩 Compose dir: $COMPOSE_DIR"
            test -f "$COMPOSE_DIR/docker-compose.yml" -o -f "$COMPOSE_DIR/docker-compose.yaml" || (echo "❌ No docker-compose in $COMPOSE_DIR"; exit 1)

            cd "$COMPOSE_DIR"
            docker compose pull || true
            docker compose up -d --build
            echo "✅ Deployed develop"

  deploy_uat:
    name: Deploy uat
    runs-on: ubuntu-latest
    if: ${{ github.ref_name == 'uat' }}
    steps:
      - name: SSH & deploy (uat)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="/home/phamvanquy1306/uat/GreenLight/GP-API"
            COMPOSE_DIR="/home/phamvanquy1306/uat/GreenLight"
            BRANCH="uat"

            echo "➡️ Git in $REPO_DIR (branch $BRANCH)"
            test -d "$REPO_DIR" || (echo "❌ Missing $REPO_DIR"; exit 1)
            cd "$REPO_DIR"
            git remote -v
            git fetch --all --prune
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            echo "🧩 Compose dir: $COMPOSE_DIR"
            test -f "$COMPOSE_DIR/docker-compose.yml" -o -f "$COMPOSE_DIR/docker-compose.yaml" || (echo "❌ No docker-compose in $COMPOSE_DIR"; exit 1)

            cd "$COMPOSE_DIR"
            docker compose pull || true
            docker compose up -d --build
            echo "✅ Deployed uat"
